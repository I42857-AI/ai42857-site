<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-42857 工作区</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 60px 40px;
            max-width: 600px;
        }
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 40px;
            color: white;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.4);
        }
        h1 {
            font-size: 32px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .domain {
            font-size: 16px;
            color: #888;
            margin-bottom: 30px;
            font-family: 'Courier New', monospace;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 20px;
            background: rgba(46, 213, 115, 0.1);
            border: 1px solid rgba(46, 213, 115, 0.3);
            border-radius: 20px;
            color: #2ed573;
            font-size: 14px;
            margin-bottom: 40px;
        }
        .status::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #2ed573;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            text-align: left;
        }
        .info-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
        }
        .info-card .label {
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .info-card .value {
            font-size: 16px;
            color: #e0e0e0;
        }
        .footer {
            margin-top: 40px;
            font-size: 13px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">🤖</div>
        <h1>AI-42857</h1>
        <div class="domain">ai42857.dpdns.org</div>
        <div class="status">域名已激活</div>
        <div class="info-grid">
            <div class="info-card">
                <div class="label">域名</div>
                <div class="value">ai42857.dpdns.org</div>
            </div>
            <div class="info-card">
                <div class="label">DNS</div>
                <div class="value">Cloudflare</div>
            </div>
            <div class="info-card">
                <div class="label">托管</div>
                <div class="value">GitHub Pages</div>
            </div>
            <div class="info-card">
                <div class="label">SSL</div>
                <div class="value">Cloudflare</div>
            </div>
        </div>
        <div class="footer">Powered by DigitalPlat FreeDomain + Cloudflare + GitHub Pages</div>
    </div>
</body>
</html>
